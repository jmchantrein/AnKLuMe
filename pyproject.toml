[project]
name = "anklume"
version = "2.0.0-dev"
description = "Declarative infrastructure compartmentalization framework"
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.11"
authors = [
    { name = "Jean-Michel Chantrein", email = "jmchantrein@users.noreply.github.com" },
]
dependencies = [
    "typer>=0.12",
    "rich>=13.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
live = [
    "fastapi>=0.115",
    "uvicorn>=0.30",
]
dev = [
    "pytest>=8.0",
    "behave>=1.2",
    "ruff>=0.8",
]

[project.scripts]
anklume = "anklume.cli:app"

[tool.ruff]
target-version = "py311"
line-length = 100
src = ["src", "tests", "live/platform"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "S", "RUF"]
ignore = ["S603", "S607"]  # subprocess calls are intentional

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # assert is fine in tests

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"
