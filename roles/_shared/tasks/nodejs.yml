---
# Shared task: Install Node.js repository via NodeSource
#
# Required variable: _nodejs_version (e.g., "22")
# Usage: ansible.builtin.include_tasks: roles/_shared/tasks/nodejs.yml
#        vars:
#          _nodejs_version: "{{ my_role_node_version }}"

- name: Download NodeSource setup script
  ansible.builtin.get_url:
    url: "https://deb.nodesource.com/setup_{{ _nodejs_version }}.x"
    dest: /tmp/nodesource-setup.sh
    mode: "0755"
    force: false

- name: Install Node.js repository  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: bash /tmp/nodesource-setup.sh
    creates: /etc/apt/sources.list.d/nodesource.list
  changed_when: true

- name: Install Node.js
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
