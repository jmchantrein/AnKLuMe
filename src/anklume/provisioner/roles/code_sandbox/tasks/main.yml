---
# Configuration du sandbox pour exécution de code

- name: Installer les dépendances système pour le sandbox
  ansible.builtin.apt:
    name:
      - python3
      - python3-pip
      - python3-venv
      - git
    state: present
    update_cache: true

- name: Créer l'utilisateur sandbox non-privilégié
  ansible.builtin.user:
    name: sandbox
    shell: /bin/bash
    create_home: true
    system: true

- name: Configurer les limites de ressources du sandbox
  ansible.builtin.copy:
    dest: /etc/security/limits.d/sandbox.conf
    mode: "0644"
    content: |
      sandbox soft nproc 100
      sandbox hard nproc 200
      sandbox soft nofile 1024
      sandbox hard nofile 2048

- name: Configurer le timeout par défaut du sandbox
  ansible.builtin.copy:
    dest: /etc/anklume/sandbox.conf
    mode: "0644"
    content: |
      SANDBOX_TIMEOUT={{ sandbox_timeout }}
      SANDBOX_NETWORK={{ sandbox_network }}
      SANDBOX_EPHEMERAL={{ sandbox_ephemeral }}
