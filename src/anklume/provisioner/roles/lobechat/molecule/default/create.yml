---
- name: Create
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Créer l'instance Incus
      ansible.builtin.command:
        cmd: "incus launch images:ubuntu/24.04 {{ item.name }}"
      loop: "{{ molecule_yml.platforms }}"
      register: create_result
      changed_when: create_result.rc == 0
      failed_when: create_result.rc != 0 and 'already exists' not in create_result.stderr

    - name: Attendre que l'instance soit prête
      ansible.builtin.command:
        cmd: "incus exec {{ item.name }} -- true"
      loop: "{{ molecule_yml.platforms }}"
      register: wait_result
      until: wait_result.rc == 0
      retries: 30
      delay: 2
      changed_when: false

    - name: Construire la configuration d'instance
      ansible.builtin.set_fact:
        instance_conf_dict:
          instance: "{{ item.name }}"
          address: "{{ item.name }}"
          user: root
          port: "22"
          identity_file: ""
          connection: community.general.incus
      loop: "{{ molecule_yml.platforms }}"
      register: instance_config_dict

    - name: Convertir en liste
      ansible.builtin.set_fact:
        instance_conf: >-
          {{ instance_config_dict.results
             | map(attribute='ansible_facts.instance_conf_dict')
             | list }}

    - name: Écrire la configuration d'instance
      ansible.builtin.copy:
        content: "{{ instance_conf | to_json | from_json | to_yaml }}"
        dest: "{{ molecule_instance_config }}"
        mode: "0600"
