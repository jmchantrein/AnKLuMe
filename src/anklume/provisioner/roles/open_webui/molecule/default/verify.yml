---
- name: Verify
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Vérifier le répertoire de données
      ansible.builtin.stat:
        path: /opt/open-webui/data
      register: data_dir

    - name: Valider le répertoire de données
      ansible.builtin.assert:
        that:
          - data_dir.stat.exists
          - data_dir.stat.isdir

    - name: Vérifier le service systemd
      ansible.builtin.stat:
        path: /etc/systemd/system/open-webui.service
      register: service_file

    - name: Valider le service systemd
      ansible.builtin.assert:
        that:
          - service_file.stat.exists

    - name: Lire le service systemd
      ansible.builtin.slurp:
        src: /etc/systemd/system/open-webui.service
      register: service_content

    - name: Valider le contenu du service
      ansible.builtin.assert:
        that:
          - "'open-webui serve' in (service_content.content | b64decode)"
          - "'port 3000' in (service_content.content | b64decode) or 'PORT=3000' in (service_content.content | b64decode)"
