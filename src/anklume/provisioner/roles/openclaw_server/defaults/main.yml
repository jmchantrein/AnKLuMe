---
# OpenClaw — assistant IA par domaine (modernisé TypeScript/npm)
openclaw_version: "latest"
openclaw_user: "openclaw"
openclaw_port: 8090
openclaw_channels: []
openclaw_llm_provider: "ollama"
openclaw_llm_model: ""
# Routage LLM (§25) — enrichies par enrich_llm_vars()
openclaw_llm_url: "{{ llm_effective_url | default('') }}"
openclaw_llm_api_key: "{{ llm_effective_key | default('') }}"
