---
- name: Verify
  hosts: all
  become: true
  gather_facts: false
  tasks:
    - name: Vérifier l'utilisateur openclaw
      ansible.builtin.getent:
        database: passwd
        key: openclaw
      register: openclaw_user

    - name: Valider l'utilisateur
      ansible.builtin.assert:
        that:
          - openclaw_user is not failed

    - name: Vérifier Node.js installé
      ansible.builtin.command:
        cmd: node --version
      changed_when: false

    - name: Vérifier le workspace OpenClaw
      ansible.builtin.stat:
        path: /home/openclaw/.openclaw/workspace
      register: workspace

    - name: Valider le workspace
      ansible.builtin.assert:
        that:
          - workspace.stat.exists
          - workspace.stat.isdir

    - name: Vérifier l'override systemd
      ansible.builtin.stat:
        path: /etc/systemd/system/openclaw.service.d/llm.conf
      register: override_file

    - name: Valider l'override systemd
      ansible.builtin.assert:
        that:
          - override_file.stat.exists

    - name: Lire l'override systemd
      ansible.builtin.slurp:
        src: /etc/systemd/system/openclaw.service.d/llm.conf
      register: override_content

    - name: Valider le contenu de l'override
      ansible.builtin.assert:
        that:
          - "'OPENCLAW_PORT' in (override_content.content | b64decode)"
          - "'OPENCLAW_LLM_PROVIDER' in (override_content.content | b64decode)"
