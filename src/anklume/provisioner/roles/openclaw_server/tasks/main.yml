---
# Rôle openclaw_server — OpenClaw modernisé (TypeScript, npm, daemon natif)

- name: Créer l'utilisateur système OpenClaw
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    system: true
    create_home: true
    shell: /bin/bash
  tags: [configure]

- name: Installer Node.js 20.x
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    apt-get install -y nodejs
  args:
    creates: /usr/bin/node
  tags: [install]

- name: Installer OpenClaw via npm global
  ansible.builtin.shell: |
    npm install -g openclaw@{{ openclaw_version }}
  args:
    creates: /usr/lib/node_modules/openclaw
  tags: [install]

- name: Exécuter openclaw onboard --install-daemon
  ansible.builtin.command:
    cmd: openclaw onboard --install-daemon
  become: true
  become_user: "{{ openclaw_user }}"
  args:
    creates: "/home/{{ openclaw_user }}/.openclaw/workspace"
  changed_when: false
  tags: [configure]

- name: Créer le répertoire d'override systemd
  ansible.builtin.file:
    path: /etc/systemd/system/openclaw.service.d
    state: directory
    mode: "0755"
  tags: [configure]

- name: Déployer l'override systemd llm.conf
  ansible.builtin.template:
    src: llm.conf.j2
    dest: /etc/systemd/system/openclaw.service.d/llm.conf
    mode: "0644"
  notify: restart openclaw
  tags: [configure]

- name: Démarrer et activer OpenClaw
  ansible.builtin.systemd:
    name: openclaw
    state: started
    enabled: true
    daemon_reload: true
  tags: [service]

- name: Attendre que OpenClaw soit prêt
  ansible.builtin.uri:
    url: "http://localhost:{{ openclaw_port }}/health"
    status_code: 200
  register: openclaw_health
  until: openclaw_health.status == 200
  retries: 15
  delay: 3
  changed_when: false
  failed_when: false
  tags: [service]
