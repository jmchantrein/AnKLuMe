# Rôle stt_server — installation et configuration Speaches (STT)
---
- name: Installer les dépendances système Speaches
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
      - git
      - python3
      - python3-venv
      - ffmpeg
    state: present
    update_cache: true
  tags: [install]

- name: Installer uv (version compatible Speaches)
  ansible.builtin.shell:
    cmd: curl -LsSf https://astral.sh/uv/0.8.14/install.sh | sh
  changed_when: true
  tags: [install]

- name: Cloner Speaches
  ansible.builtin.git:
    repo: https://github.com/speaches-ai/speaches.git
    dest: /opt/speaches
    version: master
    update: true
  tags: [install]

- name: Installer Speaches via uv
  ansible.builtin.shell:
    cmd: /root/.local/bin/uv sync
    chdir: /opt/speaches
  changed_when: true
  tags: [install]

- name: Créer le cache HuggingFace
  ansible.builtin.file:
    path: /root/.cache/huggingface/hub
    state: directory
    mode: "0755"
  tags: [configure]

- name: Détecter la présence de devices GPU
  ansible.builtin.stat:
    path: /dev/nvidia0
  register: gpu_device
  tags: [configure]

- name: Installer nvidia-smi si GPU détecté
  ansible.builtin.shell:
    cmd: |
      apt-get update -qq
      apt-get install -y -qq nvidia-cuda-toolkit 2>/dev/null \
        || apt-get install -y -qq nvidia-utils 2>/dev/null \
        || true
  when: gpu_device.stat.exists
  changed_when: true
  failed_when: false
  tags: [install]

- name: Détecter la présence GPU (nvidia-smi)
  ansible.builtin.command:
    cmd: nvidia-smi --query-gpu=name --format=csv,noheader
  register: gpu_check
  changed_when: false
  failed_when: false
  tags: [configure]

- name: Déterminer le device et compute_type
  ansible.builtin.set_fact:
    stt_actual_device: >-
      {{ (stt_device == 'auto') | ternary(
        (gpu_check.rc == 0) | ternary('cuda', 'cpu'),
        stt_device
      ) }}
    stt_actual_compute_type: >-
      {{ (stt_compute_type == 'auto') | ternary(
        (gpu_check.rc == 0) | ternary('float16', 'int8'),
        stt_compute_type
      ) }}
  tags: [configure]

- name: Installer les dépendances CUDA Python si GPU
  ansible.builtin.shell:
    cmd: /root/.local/bin/uv pip install --python /opt/speaches/.venv/bin/python nvidia-cublas-cu12 nvidia-cudnn-cu12
    chdir: /opt/speaches
  when: stt_actual_device == 'cuda'
  changed_when: true
  failed_when: false
  tags: [install]

- name: Créer la configuration systemd Speaches
  ansible.builtin.copy:
    dest: /etc/systemd/system/speaches.service
    mode: "0644"
    content: |
      [Unit]
      Description=Speaches STT Server
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      WorkingDirectory=/opt/speaches
      ExecStart=/opt/speaches/.venv/bin/uvicorn speaches.main:create_app \
        --factory \
        --host {{ stt_host }} \
        --port {{ stt_port }}
      Restart=always
      RestartSec=3
      Environment="WHISPER__MODEL={{ stt_model }}"
      Environment="WHISPER__INFERENCE_DEVICE={{ stt_actual_device }}"
      Environment="WHISPER__COMPUTE_TYPE={{ stt_actual_compute_type }}"

      [Install]
      WantedBy=multi-user.target
  notify: restart speaches
  tags: [service]

- name: Activer et démarrer Speaches
  ansible.builtin.systemd:
    name: speaches
    enabled: true
    state: started
    daemon_reload: true
  tags: [service]

- name: Attendre que Speaches soit prêt
  ansible.builtin.wait_for:
    port: "{{ stt_port }}"
    host: 127.0.0.1
    timeout: 120
  tags: [service]
