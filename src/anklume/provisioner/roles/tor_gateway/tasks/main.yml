---
- name: Installer tor et nftables
  ansible.builtin.package:
    name:
      - tor
      - nftables
    state: present
  tags: [install]

- name: Déployer la configuration torrc
  ansible.builtin.template:
    src: torrc.j2
    dest: /etc/tor/torrc
    owner: root
    group: root
    mode: "0644"
  notify: restart tor
  tags: [configure]

- name: Déployer les règles nftables pour Tor
  ansible.builtin.template:
    src: nftables-tor.conf.j2
    dest: /etc/nftables-tor.conf
    owner: root
    group: root
    mode: "0644"
  notify: reload nftables tor
  tags: [configure]

- name: Activer et démarrer tor
  ansible.builtin.systemd:
    name: tor
    enabled: true
    state: started
  tags: [service]

- name: Appliquer les règles nftables Tor
  ansible.builtin.command:
    cmd: nft -f /etc/nftables-tor.conf
  changed_when: true
  tags: [service]
